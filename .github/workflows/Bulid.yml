name: LiveContainer-FS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Detect Project and Scheme
        id: detect
        run: |
          set -e
          if ls *.xcworkspace 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcworkspace | head -n1)
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
          elif ls *.xcodeproj 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcodeproj | head -n1)
            echo "project_flag=-project" >> $GITHUB_OUTPUT
          else
            echo "No project found"
            exit 1
          fi
          echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT

          SCHEME=""
          for candidate in "LiveContainer" "LiveContainerFS" "LiveContainer-FS"; do
            if xcodebuild -project "$PROJECT_PATH" -list 2>/dev/null | grep -q "$candidate"; then
              SCHEME="$candidate"
              break
            fi
          done

          if [ -z "$SCHEME" ]; then
            SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | head -n1)
          fi

          if [ -z "$SCHEME" ]; then
            echo "No scheme found"
            exit 1
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Using scheme: $SCHEME"

      # ============================================
      # PATCH: Bypass development certificate check
      # ============================================
      - name: Patch Development Certificate Check
        run: |
          set -e
          echo "🔹 Searching for development certificate check in source..."

          # Find all Swift files that contain the certificate check
          FOUND=0

          # Search for common patterns used in LiveContainer
          grep -rn "get-task-allow" --include="*.swift" --include="*.m" --include="*.mm" . || true
          grep -rn "isDevCert\|devCert\|isDeveloper\|developmentCert" --include="*.swift" --include="*.m" . || true
          grep -rn "not signed with a development" --include="*.swift" --include="*.m" . || true
          grep -rn "won't work at all" --include="*.swift" --include="*.m" . || true
          grep -rn "development certificate" --include="*.swift" --include="*.m" . || true
          grep -rn "CODE_SIGNING\|SigningInfo\|signingInfo\|certCheck\|checkSign" --include="*.swift" --include="*.m" . || true

          echo ""
          echo "🔹 Patching all certificate validation checks..."

          # Method 1: Patch LCUtils if it exists
          # This handles the entitlement check
          find . -name "LCUtils.swift" -o -name "LCUtils.m" -o -name "LCUtils.mm" | while read file; do
            echo "Patching: $file"
            # Replace any get-task-allow check to always return true
            sed -i '' 's/SecTaskCopyValueForEntitlement.*get-task-allow.*/true as CFBoolean/g' "$file" 2>/dev/null || true
            # Replace any isDevCert = false with true
            sed -i '' 's/isDevCert = false/isDevCert = true/g' "$file" 2>/dev/null || true
            sed -i '' 's/isDevelopment = false/isDevelopment = true/g' "$file" 2>/dev/null || true
          done

          # Method 2: Patch any Swift file with the error message
          find . -name "*.swift" | while read file; do
            if grep -q "not signed with a development" "$file" 2>/dev/null; then
              echo "Found certificate check in: $file"
              
              # Comment out the entire if block that shows the error
              # Replace the check condition to always pass
              sed -i '' '/not signed with a development/,/}/s/^/\/\/ PATCHED: /' "$file" 2>/dev/null || true
              
              echo "Patched: $file"
            fi

            if grep -q "won't work at all" "$file" 2>/dev/null; then
              echo "Found secondary check in: $file"
              sed -i '' '/won'"'"'t work at all/,/}/s/^/\/\/ PATCHED: /' "$file" 2>/dev/null || true
              echo "Patched: $file"
            fi
          done

          # Method 3: Patch Objective-C files
          find . -name "*.m" -o -name "*.mm" | while read file; do
            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              echo "Found entitlement check in: $file"
              # Make the check always return YES/true
              sed -i '' 's/\[\[entitlements objectForKey:@"get-task-allow"\] boolValue\]/YES/g' "$file" 2>/dev/null || true
              sed -i '' 's/entitlements\[@"get-task-allow"\]/\@YES/g' "$file" 2>/dev/null || true
              echo "Patched: $file"
            fi
          done

          # Method 4: Direct string replacement approach
          # Find the exact file and line with the error
          ERROR_FILES=$(grep -rln "not signed with a development certificate" --include="*.swift" --include="*.m" --include="*.mm" . 2>/dev/null || true)
          
          for file in $ERROR_FILES; do
            echo "🔹 Direct patching: $file"
            echo "Before patch:"
            grep -n "development certificate" "$file" || true
            
            # Strategy: Find the function containing this error and make it return early
            # Replace the entire conditional block
            python3 << PYEOF
import re

with open("$file", "r") as f:
    content = f.read()

# Pattern 1: Remove/bypass the dev cert check entirely
# Look for if statements that lead to the error message
patterns = [
    # Swift patterns
    (r'if\s+!.*(?:isDevCert|isDev|getTaskAllow|get.task.allow).*\{[^}]*(?:not signed with a development|won\'t work)[^}]*\}', '// DEV CERT CHECK BYPASSED'),
    (r'guard\s+.*(?:isDevCert|isDev|getTaskAllow|get.task.allow).*else\s*\{[^}]*(?:not signed with a development|won\'t work)[^}]*\}', '// DEV CERT CHECK BYPASSED'),
    # Make any boolean check for dev cert return true
    (r'(let\s+\w*[Dd]ev\w*)\s*=\s*false', r'\1 = true'),
    (r'(var\s+\w*[Dd]ev\w*)\s*=\s*false', r'\1 = true'),
]

for pattern, replacement in patterns:
    content = re.sub(pattern, replacement, content, flags=re.DOTALL)

with open("$file", "w") as f:
    f.write(content)

print("Python patch applied")
PYEOF
            
            echo "After patch:"
            grep -n "development certificate\|DEV CERT CHECK\|PATCHED" "$file" || true
          done

          # Method 5: Nuclear option - find and patch the specific check function
          echo ""
          echo "🔹 Searching for the signing validation function..."
          
          # Look for common LiveContainer signing check patterns
          grep -rn "func.*check.*sign\|func.*valid.*cert\|func.*isDev\|func.*getTaskAllow" --include="*.swift" . || true
          grep -rn "taskAllow\|task_allow\|getTaskAllow" --include="*.swift" --include="*.m" . || true

          # If there's a specific LCEntitlements or signing check file
          find . -name "*Entitlement*" -o -name "*Signing*" -o -name "*Certificate*" | grep -E "\.(swift|m|mm|h)$" | while read file; do
            echo "Found signing-related file: $file"
            cat "$file" | head -50
          done

          echo ""
          echo "🔹 Final verification - checking all patched files..."
          grep -rn "PATCHED\|BYPASSED" --include="*.swift" --include="*.m" . || echo "No explicit patches found - trying alternate approach"

          # Method 6: If nothing else worked, create an override
          # Add a category/extension that overrides the check
          LCUTILS_SWIFT=$(find . -name "LCUtils.swift" | head -n1)
          if [ -n "$LCUTILS_SWIFT" ]; then
            echo ""
            echo "🔹 Adding override to LCUtils.swift..."
            # Check what's actually in LCUtils
            echo "=== LCUtils.swift contents (first 100 lines) ==="
            head -100 "$LCUTILS_SWIFT"
            echo "=== End ==="
          fi

          # Method 7: Patch Info.plist to add a flag LiveContainer might check
          find . -name "Info.plist" -path "*/LiveContainer/*" | while read plist; do
            echo "Checking: $plist"
            /usr/libexec/PlistBuddy -c "Add :LCForceDevMode bool true" "$plist" 2>/dev/null || true
          done

          echo ""
          echo "✅ Patching complete"
          echo ""
          echo "🔹 Summary of all Swift files mentioning certificates or signing:"
          grep -rln "certificate\|signing\|entitlement\|get-task-allow" --include="*.swift" . 2>/dev/null || echo "None found"

      - name: Show Patched Source
        run: |
          echo "🔹 Files modified by patch:"
          git diff --name-only
          echo ""
          echo "🔹 Full diff:"
          git diff

      - name: Clean
        run: rm -rf build DerivedData

      - name: Build Archive
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail
          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo "Archive failed"
            tail -80 build.log
            exit 1
          fi
          echo "Archive created"

      - name: Diagnose Archive
        run: |
          APP_PATH=$(find build/LiveContainer.xcarchive/Products -name "*.app" -type d | head -n1)
          if [ -n "$APP_PATH" ]; then
            echo "App: $APP_PATH"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_PATH/Info.plist" 2>/dev/null || true
            find "$APP_PATH" -name "*.appex" -type d 2>/dev/null || true
            find "$APP_PATH" -name "*.framework" -type d 2>/dev/null || true
            find "$APP_PATH" -name "*.dylib" 2>/dev/null || true
          fi

      - name: Create IPA
        run: |
          set -e
          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Found app: $(basename "$APP_PATH")"

          # Strip signatures
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          # Package
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          echo "IPA size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      - name: Verify IPA
        run: |
          unzip -t build/LiveContainer.ipa > /dev/null 2>&1 || {
            echo "IPA corrupt"
            exit 1
          }
          echo "IPA valid"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          if-no-files-found: ignore
