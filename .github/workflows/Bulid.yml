name: LiveContainer Enterprise Build

on:
  workflow_dispatch:
    inputs:
      signing_method:
        description: "Signing method"
        required: true
        default: enterprise
        type: choice
        options:
          - enterprise
          - unsigned
  pull_request:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:

      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─────────────────────────────────────────
      # 2. XCODE SETUP
      # ─────────────────────────────────────────
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      # ─────────────────────────────────────────
      # 3. IMPORT ENTERPRISE CERTIFICATE
      # Fixes: MAC verification failed, Unknown format,
      #        no identity found, keychain conflicts
      # ─────────────────────────────────────────
      - name: Import Enterprise Certificate
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing_method == 'enterprise'
        env:
          P12_BASE64: ${{ secrets.ENTERPRISE_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          set -e

          echo "🔹 Creating temporary keychain..."
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

          echo "🔹 Decoding certificate (stripping formatting artifacts)..."
          # tr -d removes line breaks/spaces that corrupt base64 from tools like base64.guru
          echo "$P12_BASE64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/original.p12"

          if [ ! -s "$RUNNER_TEMP/original.p12" ]; then
            echo "❌ Certificate file is empty after decoding — check ENTERPRISE_CERT_P12 secret"
            exit 1
          fi

          echo "🔹 Converting to legacy-compatible P12 (fixes MAC verification on modern exports)..."
          openssl pkcs12 \
            -in "$RUNNER_TEMP/original.p12" \
            -passin pass:"$P12_PASSWORD" \
            -out "$RUNNER_TEMP/temp.pem" \
            -nodes -legacy 2>/dev/null || \
          openssl pkcs12 \
            -in "$RUNNER_TEMP/original.p12" \
            -passin pass:"$P12_PASSWORD" \
            -out "$RUNNER_TEMP/temp.pem" \
            -nodes

          openssl pkcs12 \
            -export \
            -in "$RUNNER_TEMP/temp.pem" \
            -passout pass:"$P12_PASSWORD" \
            -out "$RUNNER_TEMP/legacy.p12" \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg SHA1

          echo "🔹 Importing certificate into keychain..."
          security import "$RUNNER_TEMP/legacy.p12" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "🔹 Verifying signing identity..."
          security find-identity -v -p codesigning "$KEYCHAIN"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -n1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No signing identity found — certificate may lack private key or is expired"
            exit 1
          fi
          echo "✅ Identity found: $IDENTITY"

          echo "🔹 Decoding provisioning profile..."
          echo "$PROFILE_BASE64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          if [ ! -s "$RUNNER_TEMP/profile.mobileprovision" ]; then
            echo "❌ Provisioning profile is empty — check ENTERPRISE_PROVISIONING_PROFILE secret"
            exit 1
          fi

          PROFILE_DATA=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")

          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PROFILE_DATA")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin <<< "$PROFILE_DATA")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin <<< "$PROFILE_DATA")
          BUNDLE_ID="${APP_ID#*.}"

          echo "✅ UUID:      $UUID"
          echo "✅ TEAM_ID:   $TEAM_ID"
          echo "✅ BUNDLE_ID: $BUNDLE_ID"

          echo "UUID=$UUID"           >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID"     >> "$GITHUB_ENV"
          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "KEYCHAIN=$KEYCHAIN"   >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "IDENTITY=$IDENTITY"   >> "$GITHUB_ENV"

          echo "🔹 Installing provisioning profile..."
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$RUNNER_TEMP/profile.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"

      # ─────────────────────────────────────────
      # 4. BUILD ARCHIVE
      # Fixes: exit code 65, auto-sign conflicts,
      #        missing project flag
      # ─────────────────────────────────────────
      - name: Build Archive
        run: |
          set -o pipefail
          mkdir -p build

          echo "🔹 Starting Xcode archive..."
          xcodebuild clean archive \
            -project LiveContainer.xcodeproj \
            -scheme LiveContainer \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log

          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "❌ Xcode archive failed with exit code $EXIT_CODE"
            echo "--- Last 60 lines of build log ---"
            tail -60 build.log
            exit "$EXIT_CODE"
          fi

          echo "✅ Archive succeeded"

      # ─────────────────────────────────────────
      # 5. RE-SIGN APP (Enterprise only)
      # Fixes: missing embedded profile, wrong sign order,
      #        frameworks not signed before main app
      # ─────────────────────────────────────────
      - name: Re-sign App
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing_method == 'enterprise'
        run: |
          set -e
          APP="build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app"

          if [ ! -d "$APP" ]; then
            echo "❌ App not found at $APP — archive may have failed"
            exit 1
          fi

          echo "🔹 Embedding provisioning profile..."
          cp "$RUNNER_TEMP/profile.mobileprovision" "$APP/embedded.mobileprovision"

          echo "🔹 Updating bundle ID..."
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" "$APP/Info.plist"

          echo "🔹 Extracting entitlements from profile..."
          ENTITLEMENTS_FILE="$RUNNER_TEMP/entitlements.plist"
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" \
            | plutil -extract Entitlements xml1 -o "$ENTITLEMENTS_FILE" -

          echo "🔹 Signing dylibs..."
          find "$APP" -name "*.dylib" | while read item; do
            codesign --force --sign "$IDENTITY" \
              --keychain "$KEYCHAIN" \
              --timestamp=none \
              "$item"
          done

          echo "🔹 Signing frameworks..."
          find "$APP" -name "*.framework" | while read item; do
            codesign --force --sign "$IDENTITY" \
              --keychain "$KEYCHAIN" \
              --timestamp=none \
              "$item"
          done

          echo "🔹 Signing app extensions..."
          find "$APP" -name "*.appex" | while read item; do
            codesign --force --sign "$IDENTITY" \
              --keychain "$KEYCHAIN" \
              --entitlements "$ENTITLEMENTS_FILE" \
              --timestamp=none \
              "$item"
          done

          echo "🔹 Signing main app bundle (last)..."
          codesign --force --sign "$IDENTITY" \
            --keychain "$KEYCHAIN" \
            --entitlements "$ENTITLEMENTS_FILE" \
            --timestamp=none \
            "$APP"

          echo "🔹 Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "✅ Signature verified"

      # ─────────────────────────────────────────
      # 6. PACKAGE IPA
      # ─────────────────────────────────────────
      - name: Create IPA
        run: |
          set -e
          echo "🔹 Packaging IPA..."
          mkdir -p Payload
          cp -R "build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app" Payload/
          zip -r LiveContainer.ipa Payload
          rm -rf Payload

          if [ ! -f LiveContainer.ipa ]; then
            echo "❌ IPA file not created"
            exit 1
          fi

          echo "✅ IPA created: $(du -h LiveContainer.ipa | cut -f1)"

      # ─────────────────────────────────────────
      # 7. UPLOAD ARTIFACT
      # ─────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer.ipa
          path: LiveContainer.ipa

      # ─────────────────────────────────────────
      # 8. CLEANUP (always runs)
      # ─────────────────────────────────────────
      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/original.p12" "$RUNNER_TEMP/temp.pem" "$RUNNER_TEMP/legacy.p12" 2>/dev/null || true
          echo "🔹 Keychain and temp files cleaned up"
