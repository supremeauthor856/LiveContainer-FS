name: LiveContainer-FS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix and Initialize All Submodules
        run: |
          set -e

          echo "=== .gitmodules content ==="
          cat .gitmodules || echo "No .gitmodules"

          echo ""
          echo "=== Current submodule status ==="
          git submodule status || true

          echo ""
          echo "=== Converting SSH to HTTPS ==="
          if [ -f .gitmodules ]; then
            sed -i '' 's|git@github.com:|https://github.com/|g' .gitmodules
            sed -i '' 's|ssh://git@github.com/|https://github.com/|g' .gitmodules
            echo "Updated .gitmodules:"
            cat .gitmodules
          fi

          echo ""
          echo "=== Syncing ==="
          git submodule sync --recursive

          echo ""
          echo "=== Initializing ==="
          git submodule init

          echo ""
          echo "=== Updating (force) ==="
          git submodule update --init --recursive --force 2>&1 || {
            echo ""
            echo "Standard update failed. Trying manual clone..."

            git submodule foreach --recursive 'echo "Submodule: $name at $toplevel/$sm_path"' 2>/dev/null || true

            while IFS= read -r line; do
              path=$(echo "$line" | sed -n 's/.*path = //p' | tr -d '[:space:]')
              url=$(echo "$line" | sed -n 's/.*url = //p' | tr -d '[:space:]')

              if [ -n "$path" ] && [ -n "$url" ]; then
                echo ""
                echo "Handling submodule: $path -> $url"

                if [ ! -d "$path" ] || [ -z "$(ls -A "$path" 2>/dev/null)" ]; then
                  echo "Directory empty or missing, cloning..."
                  rm -rf "$path"
                  git clone --recursive "$url" "$path" 2>&1 || {
                    echo "Clone failed for $url"
                    echo "Trying without recursive..."
                    git clone "$url" "$path" 2>&1 || echo "FAILED: Could not clone $url"
                  }
                else
                  echo "Directory exists with files"
                fi
              fi
            done < .gitmodules
          }

          echo ""
          echo "=== Final submodule status ==="
          git submodule status --recursive || true

          echo ""
          echo "=== Root directory listing ==="
          ls -la

          echo ""
          echo "=== Checking critical directories ==="
          for dir in LiveContainerUI LiveContainerSwiftUI Resources; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f | wc -l)
              echo "$dir: EXISTS ($count files)"
              ls "$dir"/ | head -10
            else
              echo "$dir: MISSING"
            fi
          done

          echo ""
          echo "=== All directories ==="
          find . -maxdepth 2 -type d | sort

          echo ""
          echo "=== All Swift files ==="
          find . -name "*.swift" -type f | head -50

      - name: Verify Source Files Exist
        run: |
          set -e
          MISSING=0

          if [ ! -f "LiveContainerUI/LCAppModel.swift" ]; then
            echo "MISSING: LiveContainerUI/LCAppModel.swift"
            MISSING=1
          fi

          if [ ! -f "LiveContainerUI/LCWebView.swift" ]; then
            echo "MISSING: LiveContainerUI/LCWebView.swift"
            MISSING=1
          fi

          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "Critical source files are missing."
            echo "LiveContainerUI directory contents:"
            ls -la LiveContainerUI/ 2>/dev/null || echo "Directory does not exist"
            echo ""
            echo "This means the LiveContainerUI submodule failed to clone."
            echo "Checking if it is a private repo..."
            
            SUBMODULE_URL=$(grep -A2 "LiveContainerUI" .gitmodules | grep url | sed 's/.*= //' | tr -d '[:space:]')
            echo "Submodule URL: $SUBMODULE_URL"
            
            echo ""
            echo "Attempting direct clone of submodule..."
            rm -rf LiveContainerUI
            git clone "$SUBMODULE_URL" LiveContainerUI 2>&1 || {
              echo ""
              echo "FAILED to clone $SUBMODULE_URL"
              echo ""
              echo "This submodule is either:"
              echo "1. A private repository (needs access token)"
              echo "2. The URL is wrong"
              echo "3. The repo was deleted"
              echo ""
              echo "To fix this, you need to either:"
              echo "- Make the submodule repo public"
              echo "- Add a GitHub token with access"
              echo "- Or copy the source files directly into this repo"
              exit 1
            }

            echo ""
            echo "LiveContainerUI after clone:"
            ls -la LiveContainerUI/
          else
            echo "All critical source files exist"
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Detect Project and Scheme
        id: detect
        run: |
          set -e
          if ls *.xcworkspace 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcworkspace | head -n1)
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
          elif ls *.xcodeproj 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcodeproj | head -n1)
            echo "project_flag=-project" >> $GITHUB_OUTPUT
          else
            echo "No project found"
            exit 1
          fi
          echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT

          SCHEME=""
          for candidate in "LiveContainer" "LiveContainerFS" "LiveContainer-FS"; do
            if xcodebuild -project "$PROJECT_PATH" -list 2>/dev/null | grep -q "$candidate"; then
              SCHEME="$candidate"
              break
            fi
          done

          if [ -z "$SCHEME" ]; then
            SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | head -n1)
          fi

          if [ -z "$SCHEME" ]; then
            echo "No scheme found"
            exit 1
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Using scheme: $SCHEME"

      - name: Patch Development Certificate Check
        run: |
          set -e
          echo "Searching for development certificate check..."

          echo "=== Files containing get-task-allow ==="
          grep -rn "get-task-allow" --include="*.swift" --include="*.m" --include="*.mm" . || echo "None"

          echo "=== Files containing development certificate error ==="
          grep -rn "not signed with a development" --include="*.swift" --include="*.m" . || echo "None"

          echo "=== Files containing cert check ==="
          grep -rn "isDevCert\|isDev\|devCert\|isDevelop\|certificatePassword\|checkCert" --include="*.swift" --include="*.m" . || echo "None"

          echo "=== Files containing task allow ==="
          grep -rn "taskAllow\|task_allow\|getTaskAllow\|get.task.allow" --include="*.swift" --include="*.m" . || echo "None"

          echo ""
          echo "Applying patches..."

          find . -name "*.swift" -type f | while read file; do
            CHANGED=0

            if grep -q "not signed with a development" "$file" 2>/dev/null; then
              echo "Patching error message in: $file"
              sed -i '' 's/isDevCert = false/isDevCert = true/g' "$file"
              sed -i '' 's/isDevelopment = false/isDevelopment = true/g' "$file"
              sed -i '' 's/devCert = false/devCert = true/g' "$file"
              sed -i '' 's/isDev = false/isDev = true/g' "$file"
              CHANGED=1
            fi

            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              echo "Patching get-task-allow in: $file"
              sed -i '' 's/\["get-task-allow"\] as? Bool ?? false/true/g' "$file"
              sed -i '' 's/\["get-task-allow"\] as? Bool/true as? Bool/g' "$file"
              sed -i '' 's/value(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/object(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/bool(forKey: "get-task-allow")/true/g' "$file"
              CHANGED=1
            fi

            if [ "$CHANGED" = "1" ]; then
              echo "Patched: $file"
            fi
          done

          find . \( -name "*.m" -o -name "*.mm" \) -type f | while read file; do
            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              echo "Patching ObjC: $file"
              sed -i '' 's/objectForKey:@"get-task-allow"\] boolValue\]/YES/g' "$file"
              sed -i '' 's/\[@"get-task-allow"\]/@YES/g' "$file"
              echo "Patched: $file"
            fi
          done

          echo ""
          echo "Patch complete"

      - name: Show Patched Source
        run: |
          echo "Files modified:"
          git diff --name-only
          echo ""
          echo "Full diff:"
          git diff || echo "No changes"

      - name: Clean
        run: rm -rf build DerivedData

      - name: Build Archive
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail
          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo "Archive failed"
            echo ""
            echo "=== Errors ==="
            grep -i "error:" build.log | tail -30
            echo ""
            echo "=== Last 50 lines ==="
            tail -50 build.log
            exit 1
          fi
          echo "Archive created"

      - name: Diagnose Archive
        if: always()
        run: |
          if [ -d "build/LiveContainer.xcarchive" ]; then
            APP_PATH=$(find build/LiveContainer.xcarchive/Products -name "*.app" -type d | head -n1)
            if [ -n "$APP_PATH" ]; then
              echo "App: $APP_PATH"
              /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_PATH/Info.plist" 2>/dev/null || true
              find "$APP_PATH" -name "*.appex" -type d 2>/dev/null || true
              find "$APP_PATH" -name "*.framework" -type d 2>/dev/null || true
              find "$APP_PATH" -name "*.dylib" 2>/dev/null || true
            fi
          else
            echo "No archive created"
          fi

      - name: Create IPA
        run: |
          set -e
          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          echo "IPA size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      - name: Verify IPA
        run: |
          unzip -t build/LiveContainer.ipa > /dev/null 2>&1 || {
            echo "IPA corrupt"
            exit 1
          }
          echo "IPA valid"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          if-no-files-found: ignore
