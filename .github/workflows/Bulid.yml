name: LiveContainer-FS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Clone Original LiveContainer
        run: |
          set -e
          echo "=== Cloning original LiveContainer with all submodules ==="

          git clone --recursive https://github.com/khanhduytran0/LiveContainer.git source 2>&1 || {
            echo "Failed to clone original repo"
            echo "Trying LiveContainer-FS forks..."

            git clone --recursive https://github.com/LiveContainerFS/LiveContainer-FS.git source 2>&1 || {
              echo "Trying another source..."
              git clone --recursive https://github.com/Starter4ik/LiveContainer-FS.git source 2>&1 || {
                echo "All clone attempts failed"
                exit 1
              }
            }
          }

          echo ""
          echo "=== Repo contents ==="
          ls -la source/

          echo ""
          echo "=== Submodule status ==="
          cd source
          git submodule status --recursive || true

          echo ""
          echo "=== All directories ==="
          find . -maxdepth 2 -type d | sort

          echo ""
          echo "=== Swift file count ==="
          find . -name "*.swift" -type f | wc -l

          echo ""
          echo "=== Key directories ==="
          for dir in LiveContainerUI LiveContainerSwiftUI Resources LiveContainerShared; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f | wc -l)
              echo "$dir: EXISTS ($count files)"
            else
              echo "$dir: not present"
            fi
          done

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Detect Project and Scheme
        id: detect
        working-directory: source
        run: |
          set -e

          echo "=== Project files ==="
          ls -la *.xcodeproj *.xcworkspace 2>/dev/null || echo "None found at root"

          if ls *.xcworkspace 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcworkspace | head -n1)
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
          elif ls *.xcodeproj 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcodeproj | head -n1)
            echo "project_flag=-project" >> $GITHUB_OUTPUT
          else
            echo "No project found"
            ls -la
            exit 1
          fi
          echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT

          echo ""
          echo "=== Available schemes ==="
          xcodebuild -project "$PROJECT_PATH" -list 2>/dev/null || \
          xcodebuild -workspace "$PROJECT_PATH" -list 2>/dev/null || \
          echo "Could not list schemes"

          SCHEME=""
          for candidate in "LiveContainer" "LiveContainerFS" "LiveContainer-FS"; do
            if xcodebuild -project "$PROJECT_PATH" -list 2>/dev/null | grep -q "$candidate"; then
              SCHEME="$candidate"
              break
            fi
            if xcodebuild -workspace "$PROJECT_PATH" -list 2>/dev/null | grep -q "$candidate"; then
              SCHEME="$candidate"
              break
            fi
          done

          if [ -z "$SCHEME" ]; then
            SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | head -n1)
          fi

          if [ -z "$SCHEME" ]; then
            echo "No scheme found"
            echo "Shared schemes:"
            find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \;
            exit 1
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Using scheme: $SCHEME"
          echo "Using project: $PROJECT_PATH"

      - name: Patch Development Certificate Check
        working-directory: source
        run: |
          set -e
          echo "=== Searching for certificate checks ==="

          echo "--- get-task-allow ---"
          grep -rn "get-task-allow" --include="*.swift" --include="*.m" --include="*.mm" . || echo "None"

          echo "--- development certificate error ---"
          grep -rn "not signed with a development" --include="*.swift" --include="*.m" . || echo "None"

          echo "--- dev cert variables ---"
          grep -rn "isDevCert\|isDev\|devCert\|isDevelop" --include="*.swift" --include="*.m" . || echo "None"

          echo "--- task allow ---"
          grep -rn "taskAllow\|task_allow\|getTaskAllow" --include="*.swift" --include="*.m" . || echo "None"

          echo "--- certificate check functions ---"
          grep -rn "func.*check.*sign\|func.*valid.*cert\|func.*signing" --include="*.swift" . || echo "None"

          echo "--- LCUtils content (first 200 lines) ---"
          for f in $(find . -name "LCUtils.m" -o -name "LCUtils.swift" -o -name "LCUtils.mm"); do
            echo "=== $f ==="
            head -200 "$f"
          done

          echo ""
          echo "=== Applying patches ==="

          find . -name "*.swift" -type f | while read file; do
            CHANGED=0

            if grep -q "not signed with a development" "$file" 2>/dev/null; then
              echo "Patching error message in: $file"
              sed -i '' 's/isDevCert = false/isDevCert = true/g' "$file"
              sed -i '' 's/isDevelopment = false/isDevelopment = true/g' "$file"
              sed -i '' 's/devCert = false/devCert = true/g' "$file"
              sed -i '' 's/isDev = false/isDev = true/g' "$file"
              CHANGED=1
            fi

            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              echo "Patching get-task-allow in: $file"
              sed -i '' 's/\["get-task-allow"\] as? Bool ?? false/true/g' "$file"
              sed -i '' 's/\["get-task-allow"\] as? Bool/true as? Bool/g' "$file"
              sed -i '' 's/value(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/object(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/bool(forKey: "get-task-allow")/true/g' "$file"
              CHANGED=1
            fi

            if [ "$CHANGED" = "1" ]; then
              echo "Patched: $file"
            fi
          done

          find . \( -name "*.m" -o -name "*.mm" \) -type f | while read file; do
            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              echo "Patching ObjC: $file"
              sed -i '' 's/objectForKey:@"get-task-allow"\] boolValue\]/YES/g' "$file"
              sed -i '' 's/\[@"get-task-allow"\]/@YES/g' "$file"
              sed -i '' 's/boolForKey:@"get-task-allow"\]/YES/g' "$file"
              echo "Patched: $file"
            fi
          done

          echo ""
          echo "=== Patch summary ==="
          git diff --stat || echo "No tracked changes (expected for fresh clone)"

      - name: Show All Changes
        working-directory: source
        run: |
          echo "=== Full diff ==="
          git diff || echo "No diff available"

      - name: Clean
        working-directory: source
        run: rm -rf build DerivedData

      - name: Build Archive
        working-directory: source
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail
          echo "Building $SCHEME from $PROJECT_PATH..."

          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo ""
            echo "=== ARCHIVE FAILED ==="
            echo ""
            echo "=== All errors ==="
            grep -i "error:" build.log | grep -v "warning" | tail -30
            echo ""
            echo "=== Last 50 lines ==="
            tail -50 build.log
            exit 1
          fi
          echo "Archive created successfully"

      - name: Diagnose Archive
        if: always()
        working-directory: source
        run: |
          if [ -d "build/LiveContainer.xcarchive" ]; then
            APP_PATH=$(find build/LiveContainer.xcarchive/Products -name "*.app" -type d | head -n1)
            if [ -n "$APP_PATH" ]; then
              echo "App: $APP_PATH"
              /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_PATH/Info.plist" 2>/dev/null || true
              echo "Extensions:"
              find "$APP_PATH" -name "*.appex" -type d 2>/dev/null || echo "None"
              echo "Frameworks:"
              find "$APP_PATH" -name "*.framework" -type d 2>/dev/null || echo "None"
              echo "Dylibs:"
              find "$APP_PATH" -name "*.dylib" 2>/dev/null || echo "None"
            fi
          else
            echo "No archive"
          fi

      - name: Create IPA
        working-directory: source
        run: |
          set -e
          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Packaging: $(basename "$APP_PATH")"

          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          echo "IPA size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      - name: Verify IPA
        working-directory: source
        run: |
          unzip -t build/LiveContainer.ipa > /dev/null 2>&1 || {
            echo "IPA corrupt"
            exit 1
          }
          echo "IPA valid"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: source/build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: source/build.log
          if-no-files-found: ignore
