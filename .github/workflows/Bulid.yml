name: LiveContainer-FS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      # ============================================
      # CHECKOUT
      # ============================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ============================================
      # XCODE SETUP
      # ============================================
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      # ============================================
      # DETECT PROJECT AND SCHEME
      # ============================================
      - name: Detect Project and Scheme
        id: detect
        run: |
          set -e

          if ls *.xcworkspace 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcworkspace | head -n1)
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
          elif ls *.xcodeproj 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcodeproj | head -n1)
            echo "project_flag=-project" >> $GITHUB_OUTPUT
          else
            echo "❌ No project found"
            exit 1
          fi

          echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT

          SCHEME=""
          for candidate in "LiveContainer" "LiveContainerFS" "LiveContainer-FS"; do
            if xcodebuild $( [ -f "$PROJECT_PATH/contents.xcworkspacedata" ] 2>/dev/null && echo "-workspace" || echo "-project" ) "$PROJECT_PATH" -list 2>/dev/null | grep -q "$candidate"; then
              SCHEME="$candidate"
              break
            fi
          done

          if [ -z "$SCHEME" ]; then
            SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | head -n1)
          fi

          if [ -z "$SCHEME" ]; then
            echo "❌ No scheme found"
            exit 1
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "✅ Scheme: $SCHEME"
          echo "✅ Project: $PROJECT_PATH"

      # ============================================
      # CLEAN
      # ============================================
      - name: Clean
        run: rm -rf build DerivedData

      # ============================================
      # BUILD UNSIGNED ARCHIVE
      # ============================================
      - name: Build Archive (Unsigned)
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail

          echo "🔹 Building $SCHEME from $PROJECT_PATH..."

          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo "❌ Archive failed"
            echo "🔹 Last 80 lines:"
            tail -80 build.log
            exit 1
          fi

          echo "✅ Archive created"

      # ============================================
      # DIAGNOSE ARCHIVE
      # ============================================
      - name: Diagnose Archive
        run: |
          APP_PATH=$(find build/LiveContainer.xcarchive/Products -name "*.app" -type d | head -n1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app in archive"
            find build/LiveContainer.xcarchive/ -type d | head -30
            exit 1
          fi

          echo "✅ App: $APP_PATH"
          echo "🔹 Bundle ID:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null || echo "Unknown"
          echo "🔹 Executable:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "Unknown"
          echo "🔹 Min OS:"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_PATH/Info.plist" 2>/dev/null || echo "Unknown"
          echo "🔹 Platforms:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleSupportedPlatforms" "$APP_PATH/Info.plist" 2>/dev/null || echo "Unknown"

          echo "🔹 Extensions:"
          find "$APP_PATH" -name "*.appex" -type d 2>/dev/null || echo "None"
          echo "🔹 Frameworks:"
          find "$APP_PATH" -name "*.framework" -type d 2>/dev/null || echo "None"
          echo "🔹 Dylibs:"
          find "$APP_PATH" -name "*.dylib" 2>/dev/null || echo "None"

      # ============================================
      # PACKAGE IPA (Clean for WSF signing)
      # ============================================
      - name: Create IPA
        run: |
          set -e

          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found"
            exit 1
          fi

          echo "✅ Packaging: $(basename "$APP_PATH")"

          # Strip ALL signatures
          echo "🔹 Stripping code signatures..."
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true

          # Remove ALL provisioning profiles
          echo "🔹 Removing provisioning profiles..."
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          # Package
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          echo "✅ IPA created"
          echo "🔹 Size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      # ============================================
      # VERIFY
      # ============================================
      - name: Verify IPA
        run: |
          IPA=build/LiveContainer.ipa
          if [ ! -f "$IPA" ]; then
            echo "❌ No IPA"
            exit 1
          fi

          unzip -t "$IPA" > /dev/null 2>&1 || {
            echo "❌ IPA corrupt"
            exit 1
          }

          echo "✅ IPA valid: $(du -h "$IPA" | awk '{print $1}')"

      # ============================================
      # UPLOAD
      # ============================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          if-no-files-found: ignorename: LiveContainer-FS Build

