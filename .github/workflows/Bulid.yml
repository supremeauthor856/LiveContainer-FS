name: LiveContainer Build (Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Clone LiveContainer Source
        run: |
          set -e
          echo "=== Cloning LiveContainer ==="
          git clone https://github.com/khanhduytran0/LiveContainer.git source
          cd source

          echo ""
          echo "=== .gitmodules content ==="
          cat .gitmodules

          echo ""
          echo "=== Converting SSH to HTTPS ==="
          sed -i '' 's|git@github.com:|https://github.com/|g' .gitmodules
          sed -i '' 's|ssh://git@github.com/|https://github.com/|g' .gitmodules
          cat .gitmodules

          echo ""
          echo "=== Initializing submodules ==="
          git submodule sync --recursive
          git submodule update --init --recursive 2>&1 || echo "Standard init had issues"

          echo ""
          echo "=== Checking each submodule ==="
          git submodule status --recursive

          echo ""
          echo "=== Manually cloning any empty submodules ==="
          git submodule foreach --quiet 'echo "$sm_path"' | while read sm_path; do
            if [ -z "$(ls -A "$sm_path" 2>/dev/null)" ]; then
              echo "Empty submodule: $sm_path"
              url=$(git config --file .gitmodules --get "submodule.$sm_path.url" 2>/dev/null || true)
              if [ -z "$url" ]; then
                url=$(grep -A2 "path = $sm_path" .gitmodules | grep url | sed 's/.*= //' | tr -d '[:space:]')
              fi
              echo "URL: $url"
              if [ -n "$url" ]; then
                rm -rf "$sm_path"
                echo "Cloning $url into $sm_path..."
                git clone --recursive "$url" "$sm_path" 2>&1 || echo "FAILED to clone $sm_path"
              fi
            else
              echo "OK: $sm_path has files"
            fi
          done

          echo ""
          echo "=== Checking for LiveContainerUI specifically ==="
          if [ -d "LiveContainerUI" ]; then
            count=$(find LiveContainerUI -type f -name "*.swift" | wc -l | tr -d ' ')
            echo "LiveContainerUI exists with $count Swift files"
            if [ "$count" -eq 0 ]; then
              echo "No Swift files found. Attempting manual clone..."
              LCUI_URL=$(grep -A2 "LiveContainerUI" .gitmodules | grep url | sed 's/.*= //' | tr -d '[:space:]')
              echo "URL from gitmodules: $LCUI_URL"

              if [ -z "$LCUI_URL" ]; then
                echo "No URL in gitmodules. Trying known URLs..."
                for try_url in \
                  "https://github.com/khanhduytran0/LiveContainerUI.git" \
                  "https://github.com/khanhduytran0/LiveContainerSwiftUI.git" \
                  "https://github.com/LiveContainer/LiveContainerUI.git"; do
                  echo "Trying: $try_url"
                  rm -rf LiveContainerUI
                  git clone "$try_url" LiveContainerUI 2>&1 && break || echo "Failed: $try_url"
                done
              else
                rm -rf LiveContainerUI
                git clone --recursive "$LCUI_URL" LiveContainerUI 2>&1 || echo "Clone failed"
              fi
            fi
          else
            echo "LiveContainerUI directory missing entirely"
            echo "Trying known URLs..."
            for try_url in \
              "https://github.com/khanhduytran0/LiveContainerUI.git" \
              "https://github.com/khanhduytran0/LiveContainerSwiftUI.git" \
              "https://github.com/LiveContainer/LiveContainerUI.git"; do
              echo "Trying: $try_url"
              git clone "$try_url" LiveContainerUI 2>&1 && break || echo "Failed: $try_url"
            done
          fi

          echo ""
          echo "=== Final directory check ==="
          for dir in LiveContainerUI LiveContainerSwiftUI LiveContainerShared Resources; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f | wc -l | tr -d ' ')
              echo "OK: $dir ($count files)"
              find "$dir" -name "*.swift" -type f | head -5
            else
              echo "MISSING: $dir"
            fi
          done

          echo ""
          echo "=== All Swift files ==="
          find . -name "*.swift" -type f -not -path "./.git/*" | sort

          echo ""
          echo "=== All directories (depth 2) ==="
          find . -maxdepth 2 -type d -not -path "./.git*" | sort

      - name: Check If LiveContainerUI Is Actually LiveContainerSwiftUI
        working-directory: source
        run: |
          set -e
          echo "=== Checking project references ==="

          PROJ=$(find . -name "*.pbxproj" | head -n1)
          if [ -n "$PROJ" ]; then
            echo "Project file: $PROJ"

            echo ""
            echo "=== References to LiveContainerUI in project ==="
            grep -c "LiveContainerUI" "$PROJ" || echo "0 references"

            echo ""
            echo "=== References to LiveContainerSwiftUI in project ==="
            grep -c "LiveContainerSwiftUI" "$PROJ" || echo "0 references"

            echo ""
            echo "=== All group/folder references ==="
            grep -o 'path = "[^"]*"' "$PROJ" | sort -u | head -30

            echo ""
            echo "=== All source file references ==="
            grep "LCAppModel\|LCWebView" "$PROJ" | head -10

            echo ""
            echo "=== File reference paths for missing files ==="
            grep -B2 -A2 "LCAppModel.swift" "$PROJ" | head -20
          fi

          echo ""
          echo "=== Maybe LiveContainerUI is just LiveContainerSwiftUI renamed ==="
          if [ -d "LiveContainerSwiftUI" ] && [ ! -d "LiveContainerUI" ]; then
            echo "LiveContainerSwiftUI exists but LiveContainerUI does not"
            echo "Checking if LCAppModel.swift is in LiveContainerSwiftUI..."
            find LiveContainerSwiftUI -name "LCAppModel.swift" -type f 2>/dev/null || echo "Not found"
            find . -name "LCAppModel.swift" -type f 2>/dev/null || echo "Not found anywhere"
          fi

          if [ -d "LiveContainerUI" ] && [ -d "LiveContainerSwiftUI" ]; then
            echo "Both directories exist"
            echo "LiveContainerUI files:"
            ls LiveContainerUI/ | head -10
            echo "LiveContainerSwiftUI files:"
            ls LiveContainerSwiftUI/ | head -10
          fi

          echo ""
          echo "=== Search for LCAppModel.swift everywhere ==="
          find . -name "LCAppModel.swift" -not -path "./.git/*" 2>/dev/null || echo "NOT FOUND ANYWHERE"

          echo ""
          echo "=== Search for LCWebView.swift everywhere ==="
          find . -name "LCWebView.swift" -not -path "./.git/*" 2>/dev/null || echo "NOT FOUND ANYWHERE"

      - name: Fix Missing Files
        working-directory: source
        run: |
          set -e

          echo "=== Attempting to resolve missing LiveContainerUI ==="

          # Check if the files exist somewhere else
          APPMODEL=$(find . -name "LCAppModel.swift" -not -path "./.git/*" | head -n1)
          WEBVIEW=$(find . -name "LCWebView.swift" -not -path "./.git/*" | head -n1)

          if [ -n "$APPMODEL" ]; then
            echo "LCAppModel.swift found at: $APPMODEL"
            ACTUAL_DIR=$(dirname "$APPMODEL")
            echo "Actual directory: $ACTUAL_DIR"

            if [ "$ACTUAL_DIR" != "./LiveContainerUI" ]; then
              echo "Files are in $ACTUAL_DIR not LiveContainerUI"
              echo "Creating symlink..."
              ln -sf "${ACTUAL_DIR#./}" LiveContainerUI 2>/dev/null || {
                echo "Symlink failed, copying instead..."
                mkdir -p LiveContainerUI
                cp -R "${ACTUAL_DIR#./}/"* LiveContainerUI/
              }
            fi
          else
            echo "LCAppModel.swift not found anywhere"
            echo ""
            echo "This file is part of the LiveContainerUI submodule"
            echo "which could not be cloned."
            echo ""
            echo "Checking git log for submodule info..."
            git log --oneline -5
            echo ""
            echo "Checking if there is a branch with the files..."
            git branch -a | head -20
            echo ""
            echo "Trying to checkout from a different branch..."
            for branch in main master develop; do
              echo "Trying branch: $branch"
              git checkout "origin/$branch" -- LiveContainerUI 2>/dev/null && {
                echo "Got LiveContainerUI from $branch"
                break
              } || echo "Not on $branch"
            done
          fi

          echo ""
          echo "=== Final check ==="
          if [ -f "LiveContainerUI/LCAppModel.swift" ]; then
            echo "SUCCESS: LCAppModel.swift exists"
          else
            echo "STILL MISSING: LCAppModel.swift"
            echo ""
            echo "=== Last resort: checking all repos for this file ==="
            echo "The LiveContainerUI submodule URL is broken or private."
            echo "We need to find the correct URL."
            echo ""
            echo "Git remote URLs:"
            git remote -v
            echo ""
            echo "Submodule registered URL:"
            git config --file .gitmodules --get-regexp url || true
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Analyze Certificate Check Code
        working-directory: source
        run: |
          set -e
          echo "=== Files with get-task-allow ==="
          grep -rn "get-task-allow" --include="*.swift" --include="*.m" --include="*.mm" --include="*.h" . || echo "None"

          echo ""
          echo "=== Files with development certificate ==="
          grep -rn -i "development.certificate\|dev.cert\|not signed with" --include="*.swift" --include="*.m" . || echo "None"

          echo ""
          echo "=== LCUtils content ==="
          for f in $(find . -name "LCUtils.*" -type f | grep -E "\.(m|mm|swift|h)$"); do
            echo ">>>>>> $f <<<<<<"
            cat "$f"
            echo ">>>>>> END $f <<<<<<"
          done

          echo ""
          echo "=== Entitlements files ==="
          find . -name "*.entitlements" -not -path "./.git/*" | while read ent; do
            echo "--- $ent ---"
            cat "$ent"
          done

      - name: Patch Certificate Check
        working-directory: source
        run: |
          set -e
          echo "Applying patches..."

          find . -name "*.swift" -type f | while read file; do
            PATCHED=0

            if grep -q "isDevCert\|isDev\|devCert\|isDevelop" "$file" 2>/dev/null; then
              sed -i '' 's/isDevCert = false/isDevCert = true/g' "$file"
              sed -i '' 's/isDevelopment = false/isDevelopment = true/g' "$file"
              sed -i '' 's/devCert = false/devCert = true/g' "$file"
              sed -i '' 's/isDev = false/isDev = true/g' "$file"
              PATCHED=1
            fi

            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              sed -i '' 's/\["get-task-allow"\] as? Bool ?? false/true/g' "$file"
              sed -i '' 's/\["get-task-allow"\] as? Bool/true as? Bool/g' "$file"
              sed -i '' 's/value(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/object(forKey: "get-task-allow") as? Bool ?? false/true/g' "$file"
              sed -i '' 's/bool(forKey: "get-task-allow")/true/g' "$file"
              PATCHED=1
            fi

            if grep -q "not signed with a development" "$file" 2>/dev/null; then
              sed -i '' '/not signed with a development/s/^.*$/\/\/ PATCHED/' "$file"
              PATCHED=1
            fi

            if [ "$PATCHED" = "1" ]; then
              echo "Patched: $file"
            fi
          done

          find . \( -name "*.m" -o -name "*.mm" \) -type f | while read file; do
            if grep -q "get-task-allow" "$file" 2>/dev/null; then
              sed -i '' 's/objectForKey:@"get-task-allow"\] boolValue\]/YES/g' "$file"
              sed -i '' 's/\[@"get-task-allow"\]/@YES/g' "$file"
              echo "Patched ObjC: $file"
            fi
          done

          find . -name "*.entitlements" -type f | while read ent; do
            if ! grep -q "get-task-allow" "$ent" 2>/dev/null; then
              sed -i '' 's|</dict>|<key>get-task-allow</key><true/></dict>|g' "$ent"
            else
              sed -i '' 's|<key>get-task-allow</key>.*<false/>|<key>get-task-allow</key><true/>|g' "$ent"
            fi
          done

          echo "Patches applied"

      - name: Show Changes
        working-directory: source
        run: |
          echo "Modified files:"
          git diff --name-only
          echo ""
          git diff

      - name: Detect Scheme
        id: detect
        working-directory: source
        run: |
          set -e
          if ls *.xcworkspace 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcworkspace | head -n1)
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
          elif ls *.xcodeproj 1>/dev/null 2>&1; then
            PROJECT_PATH=$(ls -d *.xcodeproj | head -n1)
            echo "project_flag=-project" >> $GITHUB_OUTPUT
          else
            echo "No project found"
            exit 1
          fi
          echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT

          SCHEME=""
          for candidate in "LiveContainer" "LiveContainerFS" "LiveContainer-FS"; do
            found=$(xcodebuild -project "$PROJECT_PATH" -list 2>/dev/null | grep -c "$candidate" || true)
            if [ "$found" -gt 0 ]; then
              SCHEME="$candidate"
              break
            fi
          done

          if [ -z "$SCHEME" ]; then
            SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | head -n1)
          fi

          if [ -z "$SCHEME" ]; then
            echo "No scheme"
            exit 1
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Scheme: $SCHEME"

      - name: Clean
        working-directory: source
        run: rm -rf build DerivedData

      - name: Build Archive
        working-directory: source
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail

          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo "ARCHIVE FAILED"
            grep "error:" build.log | grep -v "warning" | tail -30
            tail -50 build.log
            exit 1
          fi
          echo "Archive created"

      - name: Create IPA
        working-directory: source
        run: |
          set -e
          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          unzip -t build/LiveContainer.ipa > /dev/null 2>&1 || {
            echo "IPA corrupt"
            exit 1
          }
          echo "IPA size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: source/build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: source/build.log
          if-no-files-found: ignore
