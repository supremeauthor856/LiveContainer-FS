name: LiveContainer Enterprise Build (Stable Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      # -----------------------------
      # Import Enterprise Certificate
      # -----------------------------
      - name: Import Enterprise Certificate
        env:
          CERT_BASE64: ${{ secrets.ENTERPRISE_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > cert.p12

          if [ ! -s cert.p12 ]; then
            echo "Certificate file is empty or invalid"
            exit 1
          fi

          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security default-keychain -s build.keychain

          security import cert.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -A

          echo "Available signing identities:"
          security find-identity -v -p codesigning

          COUNT=$(security find-identity -v -p codesigning | grep -c "Apple")
          if [ "$COUNT" -eq 0 ]; then
            echo "No valid signing identity found"
            exit 1
          fi

      # -----------------------------
      # Install Provisioning Profile
      # -----------------------------
      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          if [ ! -s profile.mobileprovision ]; then
            echo "Provisioning profile invalid"
            exit 1
          fi

          UUID=$(grep -a -A1 UUID profile.mobileprovision | grep -io "[-A-F0-9]\{36\}")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # -----------------------------
      # Clean Build Folder
      # -----------------------------
      - name: Clean
        run: rm -rf build

      # -----------------------------
      # Archive (for .xcodeproj)
      # -----------------------------
      - name: Archive LiveContainer
        run: |
          xcodebuild \
            -project LiveContainer.xcodeproj \
            -scheme LiveContainer \
            -configuration Release \
            -archivePath build/LiveContainer.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual

      # -----------------------------
      # Create Export Options
      # -----------------------------
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>enterprise</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      # -----------------------------
      # Export IPA
      # -----------------------------
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LiveContainer.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      # -----------------------------
      # Upload IPA Artifact
      # -----------------------------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: build/*.ipa
