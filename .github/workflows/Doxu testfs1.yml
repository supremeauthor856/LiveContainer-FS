name: Ultimate LiveContainer Build (Enterprise Safe)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -switch /Applications/Xcode.app

      # -----------------------------
      # Import Certificate
      # -----------------------------
      - name: Import Enterprise Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          
          security import certificate.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain

          security find-identity -v -p codesigning

      # -----------------------------
      # Install Provisioning Profile
      # -----------------------------
      - name: Install Provisioning Profile
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > profile.mobileprovision
          
          UUID=$(grep -a -A1 UUID profile.mobileprovision | grep -io "[-A-F0-9]\{36\}")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # -----------------------------
      # Clean Build
      # -----------------------------
      - name: Clean Build Folder
        run: rm -rf build

      # -----------------------------
      # Archive LiveContainer
      # -----------------------------
      - name: Build Archive
        run: |
          xcodebuild \
            -scheme LiveContainer \
            -configuration Release \
            -archivePath build/LiveContainer.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }}

      # -----------------------------
      # Export IPA
      # -----------------------------
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>enterprise</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LiveContainer.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      # -----------------------------
      # Upload Artifact
      # -----------------------------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-IPA
          path: build/*.ipa
