name: Ultimate LiveContainer Enterprise Build

on:
workflow_dispatch:
inputs:
signing_method:
description: "Signing method"
required: true
default: enterprise
type: choice
options:
- enterprise
- unsigned
pull_request:

jobs:
build:
runs-on: macos-14

steps:
- name: Checkout Repository
uses: actions/checkout@v4
with:
submodules: recursive
- name: Setup Xcode
uses: maxim-lobanov/setup-xcode@v1
with:
xcode-version: "16.2"

# -------------------------------------------------
# Enterprise Certificate Import for Build Signing
# -------------------------------------------------
- name: Import Enterprise Certificate
if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing_method == 'enterprise'
env:
P12_BASE64: ${{ secrets.ENTERPRISE_CERT_P12 }}
P12_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
PROFILE_BASE64: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
run: |
set -e

echo "🔹 Creating temporary keychain..."
KEYCHAIN=$RUNNER_TEMP/build.keychain
KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
security set-keychain-settings -lut 21600 "$KEYCHAIN"
security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
security list-keychains -d user -s "$KEYCHAIN"

echo "🔹 Decoding certificate..."
echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/original.p12

echo "🔹 Converting to legacy-compatible P12..."
openssl pkcs12 -in $RUNNER_TEMP/original.p12 \
-passin pass:"$P12_PASSWORD" \
-out $RUNNER_TEMP/temp.pem -nodes

openssl pkcs12 -export \
-in $RUNNER_TEMP/temp.pem \
-passout pass:"$P12_PASSWORD" \
-out $RUNNER_TEMP/legacy.p12 \
-keypbe PBE-SHA1-3DES \
-certpbe PBE-SHA1-3DES \
-macalg SHA1

echo "🔹 Importing certificate into keychain..."
security import $RUNNER_TEMP/legacy.p12 \
-k "$KEYCHAIN" \
-P "$P12_PASSWORD" \
-T /usr/bin/codesign \
-T /usr/bin/security \
-A

security set-key-partition-list \
-S apple-tool:,apple:,codesign: \
-s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

echo "🔹 Finding signing identity..."
IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -n1 | awk '{print $2}')
echo "SIGNING IDENTITY: $IDENTITY"

echo "🔹 Decoding provisioning profile..."
echo "$PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision

UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision)")
TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision)")
APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision)")
BUNDLE_ID=${APP_ID#*.}

echo "UUID=$UUID" >> $GITHUB_ENV
echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
echo "KEYCHAIN=$KEYCHAIN" >> $GITHUB_ENV

mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
cp $RUNNER_TEMP/profile.mobileprovision \
~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

# -------------------------------------------------
# Build LiveContainer Archive (No Auto-Sign)
# -------------------------------------------------
- name: Build Archive
run: |
set -o pipefail
mkdir -p build
xcodebuild clean archive \
-project LiveContainer.xcodeproj \
-scheme LiveContainer \
-configuration Release \
-sdk iphoneos \
-destination generic/platform=iOS \
-archivePath build/LiveContainer.xcarchive \
CODE_SIGNING_ALLOWED=NO \
CODE_SIGNING_REQUIRED=NO \
2>&1 | tee build.log || (echo "❌ Xcode archive failed" && exit 1)

# -------------------------------------------------
# Enterprise Re-sign LiveContainer
# -------------------------------------------------
- name: Re-sign LiveContainer
if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing_method == 'enterprise'
run: |
APP=build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app

echo "🔹 Embedding provisioning profile..."
cp $RUNNER_TEMP/profile.mobileprovision $APP/embedded.mobileprovision
/usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" $APP/Info.plist

echo "🔹 Signing frameworks and dylibs..."
find $APP -name "*.framework" -o -name "*.dylib" | while read item; do
codesign --force --sign "$IDENTITY" \
--keychain "$KEYCHAIN" \
--timestamp=none "$item"
done

echo "🔹 Signing main app..."
codesign --force --sign "$IDENTITY" \
--keychain "$KEYCHAIN" \
--entitlements <(security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract Entitlements xml1 -o - -) \
--timestamp=none "$APP"

codesign --verify --deep --strict "$APP"

# -------------------------------------------------
# Package IPA for Distribution
# -------------------------------------------------
- name: Create IPA
run: |
mkdir Payload
cp -R build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app Payload/
zip -r LiveContainer.ipa Payload
rm -rf Payload

- name: Upload IPA Artifact
uses: actions/upload-artifact@v4
with:
name: LiveContainer.ipa
path: LiveContainer.ipa
