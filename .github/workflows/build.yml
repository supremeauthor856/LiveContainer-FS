name: iOS Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      signing_method:
        description: 'Signing method'
        required: true
        default: 'unsigned'
        type: choice
        options:
          - unsigned
          - enterprise

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Import Enterprise Certificate & Profile
        if: github.event.inputs.signing_method == 'enterprise'
        env:
          ENTERPRISE_CERT_P12: ${{ secrets.ENTERPRISE_CERT_P12 }}
          ENTERPRISE_CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          ENTERPRISE_PROVISIONING_PROFILE: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode the p12 (strip line breaks to avoid corruption)
          echo "$ENTERPRISE_CERT_P12" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.p12

          # Step 1: Extract cert and key into unencrypted PEM
          openssl pkcs12 \
            -in $RUNNER_TEMP/enterprise.p12 \
            -passin pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise.pem \
            -nodes

          # Step 2: Re-export as legacy p12 with SHA1 MAC + 3DES encryption
          # macOS security import requires SHA1 MAC - SHA256 causes "unknown format" error
          openssl pkcs12 \
            -export \
            -in $RUNNER_TEMP/enterprise.pem \
            -passout pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise_legacy.p12 \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg SHA1

          # Import the converted legacy p12 into keychain
          security import $RUNNER_TEMP/enterprise_legacy.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$ENTERPRISE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Install the enterprise provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$ENTERPRISE_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.mobileprovision

          # Extract UUID and bundle ID dynamically from the profile
          PROFILE_UUID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | grep -A1 "UUID" | tail -1 | tr -d '\t ')
          BUNDLE_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | grep "application-identifier" -A1 | tail -1 | tr -d '\t ' | sed 's/.*\.//' | sed 's/<\/string>//')

          cp $RUNNER_TEMP/enterprise.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "Installed profile UUID: $PROFILE_UUID"
          echo "Bundle ID: $BUNDLE_ID"

      - name: Build and Archive (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Build and Archive (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            | xcpretty

      - name: Create Export Options Plist (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          cat > $PWD/build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist $PWD/build/ExportOptions.plist \
            | xcpretty
          mv $PWD/build/export/LiveContainer.ipa $PWD/build/LiveContainer.ipa

      - name: Create IPA (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app build/Payload/
          cd build
          zip -r LiveContainer.ipa Payload
          rm -rf Payload
          echo "IPA created successfully:"
          ls -lh LiveContainer.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-${{ github.event.inputs.signing_method || 'unsigned' }}.ipa
          path: build/LiveContainer.ipa
