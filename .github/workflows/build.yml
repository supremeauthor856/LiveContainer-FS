name: iOS Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      signing_method:
        description: 'Signing method'
        required: true
        default: 'enterprise'
        type: choice
        options:
          - enterprise
          - unsigned

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Import Enterprise Certificate & Profile
        if: github.event.inputs.signing_method == 'enterprise'
        env:
          ENTERPRISE_CERT_P12: ${{ secrets.ENTERPRISE_CERT_P12 }}
          ENTERPRISE_CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          ENTERPRISE_PROVISIONING_PROFILE: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # ---------------------------------------------------------------
          # FIX 1: Download Apple intermediate certificates so the runner
          # trusts the full chain from Apple Root CA -> WWDR -> our cert.
          # Without this the cert is flagged as "not valid for code signing".
          # ---------------------------------------------------------------
          echo "Downloading Apple intermediate certificates..."
          curl -s -o $RUNNER_TEMP/AppleWWDRCAG3.cer \
            https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -s -o $RUNNER_TEMP/AppleRootCA.cer \
            https://www.apple.com/appleca/AppleIncRootCertificate.cer

          security import $RUNNER_TEMP/AppleWWDRCAG3.cer \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -A 2>/dev/null || true
          security import $RUNNER_TEMP/AppleRootCA.cer \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -A 2>/dev/null || true

          # Import the enterprise p12
          echo "$ENTERPRISE_CERT_P12" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.p12

          openssl pkcs12 \
            -in $RUNNER_TEMP/enterprise.p12 \
            -passin pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise.pem \
            -nodes

          openssl pkcs12 \
            -export \
            -in $RUNNER_TEMP/enterprise.pem \
            -passout pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise_legacy.p12 \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg SHA1

          security import $RUNNER_TEMP/enterprise_legacy.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$ENTERPRISE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

          # Decode provisioning profile
          echo "$ENTERPRISE_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode \
            > $RUNNER_TEMP/enterprise.mobileprovision

          PROFILE_UUID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep -iE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" | \
            grep -oE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")

          BUNDLE_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "application-identifier" -A1 | \
            grep -o '[A-Z0-9]*\.[a-zA-Z0-9.]*' | tail -1 | cut -d'.' -f2-)

          TEAM_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "TeamIdentifier" -A2 | \
            grep -o '[A-Z0-9]\{10\}' | head -1)

          echo "Profile UUID: $PROFILE_UUID"
          echo "Bundle ID:    $BUNDLE_ID"
          echo "Team ID:      $TEAM_ID"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp $RUNNER_TEMP/enterprise.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID"       >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID"           >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Patch Xcode project for enterprise signing
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          python3 << 'PYEOF'
          import os, re, glob, plistlib

          TEAM_ID      = os.environ["TEAM_ID"]
          BUNDLE_ID    = os.environ["BUNDLE_ID"]
          PROFILE_UUID = os.environ["PROFILE_UUID"]

          OLD_TEAM        = "THS5M4V5GL"
          OLD_BUNDLE_BASE = "com.flekstore.livecontainer"

          # Targets that are APPS and need a provisioning profile
          APP_TARGETS = {"LiveContainer", "LiveProcess"}

          # Targets that are frameworks/dylibs - must NOT have a provisioning profile
          NO_PROFILE_TARGETS = {
            "LiveContainerSwiftUI", "LiveContainerShared",
            "SideStore", "TweakLoader", "ZSign", "TestJITLess"
          }

          # ---------------------------------------------------------------
          # FIX 2, 3, 4: Patch project.pbxproj properly per target type
          # ---------------------------------------------------------------
          pbxproj_path = "LiveContainer.xcodeproj/project.pbxproj"
          with open(pbxproj_path, "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

          # Replace old team ID everywhere
          content = content.replace(OLD_TEAM, TEAM_ID)

          # Replace sub-bundle IDs (e.g. com.flekstore.livecontainer.LiveProcess)
          content = re.sub(
              re.escape(OLD_BUNDLE_BASE) + r'\.[a-zA-Z0-9.]+',
              BUNDLE_ID,
              content
          )
          # Replace base bundle ID
          content = content.replace(OLD_BUNDLE_BASE, BUNDLE_ID)

          # FIX 3: Remove provisioning profile from framework/dylib targets.
          # Find each buildSettings block and if it belongs to a non-app target,
          # clear its PROVISIONING_PROFILE_SPECIFIER.
          # Strategy: replace all ProvisioningStyle = Automatic with Manual first
          content = content.replace("ProvisioningStyle = Automatic", "ProvisioningStyle = Manual")
          content = content.replace('CODE_SIGN_STYLE = Automatic', 'CODE_SIGN_STYLE = Manual')

          # FIX 4: Give bundle IDs to targets that have none
          # TweakLoader, ZSign, TestJITLess are dylibs - give them placeholder IDs
          for target_name, suffix in [
              ("TweakLoader",  "tweakloader"),
              ("ZSign",        "zsign"),
              ("TestJITLess",  "testjitless"),
          ]:
              # Find the build settings block right after each target name appears
              content = re.sub(
                  r'(name = ' + re.escape(target_name) + r'[^}]+?PRODUCT_BUNDLE_IDENTIFIER\s*=\s*"";)',
                  lambda m: m.group(0).replace(
                      'PRODUCT_BUNDLE_IDENTIFIER = "";',
                      f'PRODUCT_BUNDLE_IDENTIFIER = "{BUNDLE_ID}.{suffix}";'
                  ),
                  content, flags=re.DOTALL
              )

          # FIX 3: Clear PROVISIONING_PROFILE_SPECIFIER for non-app targets.
          # We do this by processing the file section by section.
          # Each target section in pbxproj looks like:
          # <name> = { ... buildSettings = { ... }; ... }
          # We identify which target each buildSettings belongs to and
          # only set the profile for APP_TARGETS.

          # Simpler approach: set profile specifier only where bundle ID matches main app
          content = re.sub(
              r'PROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
              f'PROVISIONING_PROFILE_SPECIFIER = "";',
              content
          )
          # Now set it only for the main bundle ID sections
          # (sections that also have PRODUCT_BUNDLE_IDENTIFIER = BUNDLE_ID)
          # We'll do this by finding build setting blocks containing our bundle ID
          def patch_build_settings_blocks(text):
              # Split on buildSettings = { ... } blocks
              result = []
              i = 0
              while i < len(text):
                  # Find next buildSettings block
                  bs_start = text.find('buildSettings = {', i)
                  if bs_start == -1:
                      result.append(text[i:])
                      break
                  result.append(text[i:bs_start])
                  # Find matching closing brace
                  depth = 0
                  j = bs_start
                  while j < len(text):
                      if text[j] == '{':
                          depth += 1
                      elif text[j] == '}':
                          depth -= 1
                          if depth == 0:
                              break
                      j += 1
                  block = text[bs_start:j+1]
                  # If this block contains our main bundle ID, set the profile
                  if f'PRODUCT_BUNDLE_IDENTIFIER = {BUNDLE_ID};' in block or \
                     f'PRODUCT_BUNDLE_IDENTIFIER = "{BUNDLE_ID}";' in block:
                      block = block.replace(
                          'PROVISIONING_PROFILE_SPECIFIER = "";',
                          f'PROVISIONING_PROFILE_SPECIFIER = "{PROFILE_UUID}";'
                      )
                  # If this block is for framework targets, ensure no profile
                  # (already cleared above, leave as empty string)
                  result.append(block)
                  i = j + 1
              return ''.join(result)

          content = patch_build_settings_blocks(content)

          with open(pbxproj_path, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Patched: {pbxproj_path}")

          # ---------------------------------------------------------------
          # FIX 5: Strip entitlements that the enterprise profile doesn't support.
          # LiveContainer requests HealthKit, App Groups, increased-memory-limit,
          # get-task-allow etc. Our profile doesn't cover these so we strip them.
          # ---------------------------------------------------------------
          entitlement_files = glob.glob("**/*.entitlements", recursive=True)
          print(f"\nFound entitlement files: {entitlement_files}")

          # Entitlements to REMOVE (not in enterprise profile)
          REMOVE_ENTITLEMENTS = {
              "com.apple.developer.healthkit",
              "com.apple.developer.healthkit.access",
              "com.apple.developer.healthkit.background-delivery",
              "com.apple.developer.kernel.increased-memory-limit",
              "com.apple.security.application-groups",
              "get-task-allow",
              "com.apple.developer.default-data-protection",
          }

          for ent_file in entitlement_files:
              try:
                  with open(ent_file, "rb") as f:
                      plist = plistlib.load(f)

                  original_keys = set(plist.keys())
                  for key in REMOVE_ENTITLEMENTS:
                      plist.pop(key, None)

                  removed = original_keys - set(plist.keys())
                  if removed:
                      print(f"  {ent_file}: removed {removed}")
                      with open(ent_file, "wb") as f:
                          plistlib.dump(plist, f)
                  else:
                      print(f"  {ent_file}: no changes needed")
              except Exception as e:
                  print(f"  ERROR processing {ent_file}: {e}")

          # Also patch xcconfig files
          for xcconfig in glob.glob("**/*.xcconfig", recursive=True):
              try:
                  with open(xcconfig, "r") as f:
                      text = f.read()
                  original = text
                  text = text.replace(OLD_TEAM, TEAM_ID)
                  text = text.replace(OLD_BUNDLE_BASE, BUNDLE_ID)
                  if text != original:
                      with open(xcconfig, "w") as f:
                          f.write(text)
                      print(f"Patched xcconfig: {xcconfig}")
              except Exception as e:
                  print(f"ERROR patching {xcconfig}: {e}")

          print("\n=== Final verification ===")
          with open(pbxproj_path) as f:
              final = f.read()
          print(f"Old team refs remaining:   {final.count(OLD_TEAM)}")
          print(f"Old bundle refs remaining: {final.count(OLD_BUNDLE_BASE)}")
          print(f"Profile specifier set:     {final.count(PROFILE_UUID)}")
          PYEOF

      - name: Build and Archive (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build and Archive (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

      - name: Create Export Options Plist (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          mkdir -p $PWD/build
          cat > $PWD/build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist $PWD/build/ExportOptions.plist
          mv $PWD/build/export/LiveContainer.ipa $PWD/build/LiveContainer.ipa

      - name: Create IPA (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app build/Payload/
          cd build
          zip -r LiveContainer.ipa Payload
          rm -rf Payload
          echo "IPA created successfully:"
          ls -lh LiveContainer.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-${{ github.event.inputs.signing_method || 'enterprise' }}.ipa
          path: build/LiveContainer.ipa
