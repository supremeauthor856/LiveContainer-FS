name: iOS Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      signing_method:
        description: 'Signing method'
        required: true
        default: 'enterprise'
        type: choice
        options:
          - enterprise
          - unsigned

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Import Enterprise Certificate & Profile
        if: github.event.inputs.signing_method == 'enterprise'
        env:
          ENTERPRISE_CERT_P12: ${{ secrets.ENTERPRISE_CERT_P12 }}
          ENTERPRISE_CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          ENTERPRISE_PROVISIONING_PROFILE: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -s -o $RUNNER_TEMP/AppleWWDRCAG3.cer \
            https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer || true
          curl -s -o $RUNNER_TEMP/AppleWWDRCAG4.cer \
            https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer || true
          for cert in $RUNNER_TEMP/Apple*.cer; do
            security import "$cert" -k "$KEYCHAIN_PATH" -A 2>/dev/null || true
          done

          echo "$ENTERPRISE_CERT_P12" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.p12
          openssl pkcs12 -in $RUNNER_TEMP/enterprise.p12 \
            -passin pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise.pem -nodes
          openssl pkcs12 -export \
            -in $RUNNER_TEMP/enterprise.pem \
            -passout pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise_legacy.p12 \
            -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg SHA1

          security import $RUNNER_TEMP/enterprise_legacy.p12 \
            -k "$KEYCHAIN_PATH" -P "$ENTERPRISE_CERT_PASSWORD" \
            -T /usr/bin/codesign -A
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "$ENTERPRISE_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode \
            > $RUNNER_TEMP/enterprise.mobileprovision

          PROFILE_UUID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep -iE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" | \
            grep -oE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")
          BUNDLE_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "application-identifier" -A1 | \
            grep -o '[A-Z0-9]*\.[a-zA-Z0-9.]*' | tail -1 | cut -d'.' -f2-)
          TEAM_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "TeamIdentifier" -A2 | \
            grep -o '[A-Z0-9]\{10\}' | head -1)
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning \
            "$KEYCHAIN_PATH" | grep "iPhone Distribution" | \
            head -1 | sed 's/.*"\(.*\)"/\1/')

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp $RUNNER_TEMP/enterprise.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          python3 -c "
          import plistlib
          ents = {
              'application-identifier': '$TEAM_ID.$BUNDLE_ID',
              'com.apple.developer.team-identifier': '$TEAM_ID',
              'aps-environment': 'production',
              'keychain-access-groups': ['$TEAM_ID.*', 'com.apple.token'],
              'get-task-allow': False,
          }
          with open('$RUNNER_TEMP/entitlements.plist', 'wb') as f:
              plistlib.dump(ents, f)
          "

          echo "PROFILE_UUID=$PROFILE_UUID"         >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID"               >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID"                   >> $GITHUB_ENV
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"        >> $GITHUB_ENV

      - name: Build Archive (Unsigned)
        run: |
          set -o pipefail
          mkdir -p $RUNNER_TEMP/logs

          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee $RUNNER_TEMP/logs/build_full.log
          BUILD_EXIT=${PIPESTATUS[0]}

          # Save just the errors to a separate small file
          grep -E "error:|warning:|note:" $RUNNER_TEMP/logs/build_full.log \
            | grep "error:" \
            > $RUNNER_TEMP/logs/errors_only.txt 2>/dev/null || true

          echo "=== ERRORS ONLY ===" 
          cat $RUNNER_TEMP/logs/errors_only.txt

          exit $BUILD_EXIT

      # Always upload logs even if build fails
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ runner.temp }}/logs/
          retention-days: 5

      - name: Package Unsigned IPA
        if: github.event.inputs.signing_method != 'enterprise' && success()
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app \
            build/Payload/
          cd build && zip -r LiveContainer.ipa Payload && rm -rf Payload
          ls -lh LiveContainer.ipa

      - name: Re-sign with Enterprise Certificate
        if: github.event.inputs.signing_method == 'enterprise' && success()
        run: |
          APP_PATH="$PWD/build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app"
          cp $RUNNER_TEMP/enterprise.mobileprovision "$APP_PATH/embedded.mobileprovision"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier $BUNDLE_ID" "$APP_PATH/Info.plist"
          find "$APP_PATH" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) | \
          while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" --timestamp=none "$item" 2>&1 || true
          done
          codesign --force --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements $RUNNER_TEMP/entitlements.plist \
            --timestamp=none "$APP_PATH"
          codesign --verify --verbose=2 "$APP_PATH" && echo "✅ Signed OK" || echo "⚠️ Warning"

      - name: Package Enterprise IPA
        if: github.event.inputs.signing_method == 'enterprise' && success()
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app \
            build/Payload/
          cd build && zip -r LiveContainer.ipa Payload && rm -rf Payload
          ls -lh LiveContainer.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-${{ github.event.inputs.signing_method || 'enterprise' }}.ipa
          path: build/LiveContainer.ipa
          retention-days: 30
