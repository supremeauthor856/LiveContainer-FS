name: iOS Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      signing_method:
        description: 'Signing method'
        required: true
        default: 'enterprise'
        type: choice
        options:
          - enterprise
          - unsigned

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Import Enterprise Certificate & Profile
        if: github.event.inputs.signing_method == 'enterprise'
        env:
          ENTERPRISE_CERT_P12: ${{ secrets.ENTERPRISE_CERT_P12 }}
          ENTERPRISE_CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          ENTERPRISE_PROVISIONING_PROFILE: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode the p12 (strip line breaks to avoid corruption)
          echo "$ENTERPRISE_CERT_P12" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.p12

          # Step 1: Extract cert and key into unencrypted PEM
          openssl pkcs12 \
            -in $RUNNER_TEMP/enterprise.p12 \
            -passin pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise.pem \
            -nodes

          # Step 2: Re-export as legacy p12 with SHA1 MAC + 3DES encryption
          openssl pkcs12 \
            -export \
            -in $RUNNER_TEMP/enterprise.pem \
            -passout pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise_legacy.p12 \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg SHA1

          # Import the converted legacy p12 into keychain
          security import $RUNNER_TEMP/enterprise_legacy.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$ENTERPRISE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "Available signing identities:"
          security find-identity -v -p codesigning

          # Decode provisioning profile
          echo "$ENTERPRISE_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.mobileprovision

          # Extract UUID cleanly using regex
          PROFILE_UUID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep -iE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" | \
            grep -oE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")

          # Extract bundle ID without team prefix
          BUNDLE_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "application-identifier" -A1 | \
            grep -o '[A-Z0-9]*\.[a-zA-Z0-9.]*' | tail -1 | cut -d'.' -f2-)

          # Extract team ID
          TEAM_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "TeamIdentifier" -A2 | \
            grep -o '[A-Z0-9]\{10\}' | head -1)

          echo "Profile UUID: $PROFILE_UUID"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Team ID: $TEAM_ID"

          # Create directory and install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp $RUNNER_TEMP/enterprise.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      - name: Configure xcconfig for Enterprise signing
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          # LiveContainer uses xcconfigs/Global.xcconfig for signing settings.
          # xcodebuild command-line overrides are ignored when xcconfig is present,
          # so we must edit the xcconfig file directly before building.
          XCCONFIG="xcconfigs/Global.xcconfig"

          if [ -f "$XCCONFIG" ]; then
            echo "Found $XCCONFIG, patching signing settings..."

            # Remove any existing DEVELOPMENT_TEAM and PRODUCT_BUNDLE_IDENTIFIER lines
            sed -i '' '/^DEVELOPMENT_TEAM/d' "$XCCONFIG"
            sed -i '' '/^PRODUCT_BUNDLE_IDENTIFIER/d' "$XCCONFIG"
            sed -i '' '/^CODE_SIGN_STYLE/d' "$XCCONFIG"
            sed -i '' '/^CODE_SIGN_IDENTITY/d' "$XCCONFIG"
            sed -i '' '/^PROVISIONING_PROFILE_SPECIFIER/d' "$XCCONFIG"

            # Append correct signing values
            echo "" >> "$XCCONFIG"
            echo "DEVELOPMENT_TEAM = $TEAM_ID" >> "$XCCONFIG"
            echo "PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID" >> "$XCCONFIG"
            echo "CODE_SIGN_STYLE = Manual" >> "$XCCONFIG"
            echo "CODE_SIGN_IDENTITY = iPhone Distribution" >> "$XCCONFIG"
            echo "PROVISIONING_PROFILE_SPECIFIER = $PROFILE_UUID" >> "$XCCONFIG"

            echo "Patched xcconfig:"
            cat "$XCCONFIG"
          else
            echo "xcconfig not found at $XCCONFIG, trying to find it..."
            find . -name "Global.xcconfig" -o -name "*.xcconfig" | head -10
          fi

      - name: Build and Archive (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build and Archive (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS"

      - name: Create Export Options Plist (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          mkdir -p $PWD/build
          cat > $PWD/build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist $PWD/build/ExportOptions.plist
          mv $PWD/build/export/LiveContainer.ipa $PWD/build/LiveContainer.ipa

      - name: Create IPA (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app build/Payload/
          cd build
          zip -r LiveContainer.ipa Payload
          rm -rf Payload
          echo "IPA created successfully:"
          ls -lh LiveContainer.ipa

      - name: Upload IPA artifac
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-${{ github.event.inputs.signing_method || 'enterprise' }}.ipa
          path: build/LiveContainer.ipa
