name: iOS Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      signing_method:
        description: 'Signing method'
        required: true
        default: 'enterprise'
        type: choice
        options:
          - enterprise
          - unsigned

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Import Enterprise Certificate & Profile
        if: github.event.inputs.signing_method == 'enterprise'
        env:
          ENTERPRISE_CERT_P12: ${{ secrets.ENTERPRISE_CERT_P12 }}
          ENTERPRISE_CERT_PASSWORD: ${{ secrets.ENTERPRISE_CERT_PASSWORD }}
          ENTERPRISE_PROVISIONING_PROFILE: ${{ secrets.ENTERPRISE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$ENTERPRISE_CERT_P12" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.p12

          openssl pkcs12 \
            -in $RUNNER_TEMP/enterprise.p12 \
            -passin pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise.pem \
            -nodes

          openssl pkcs12 \
            -export \
            -in $RUNNER_TEMP/enterprise.pem \
            -passout pass:"$ENTERPRISE_CERT_PASSWORD" \
            -out $RUNNER_TEMP/enterprise_legacy.p12 \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg SHA1

          security import $RUNNER_TEMP/enterprise_legacy.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$ENTERPRISE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

          echo "$ENTERPRISE_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/enterprise.mobileprovision

          PROFILE_UUID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep -iE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" | \
            grep -oE "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}")

          BUNDLE_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "application-identifier" -A1 | \
            grep -o '[A-Z0-9]*\.[a-zA-Z0-9.]*' | tail -1 | cut -d'.' -f2-)

          TEAM_ID=$(strings $RUNNER_TEMP/enterprise.mobileprovision | \
            grep "TeamIdentifier" -A2 | \
            grep -o '[A-Z0-9]\{10\}' | head -1)

          echo "Profile UUID: $PROFILE_UUID"
          echo "Bundle ID:    $BUNDLE_ID"
          echo "Team ID:      $TEAM_ID"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp $RUNNER_TEMP/enterprise.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID"       >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID"           >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Patch entire Xcode project for enterprise signing
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          python3 << 'PYEOF'
          import os, re, glob

          TEAM_ID      = os.environ["TEAM_ID"]
          BUNDLE_ID    = os.environ["BUNDLE_ID"]
          PROFILE_UUID = os.environ["PROFILE_UUID"]

          OLD_TEAM        = "THS5M4V5GL"
          OLD_BUNDLE_BASE = "com.flekstore.livecontainer"

          print(f"Patching project:")
          print(f"  Team:    {OLD_TEAM} -> {TEAM_ID}")
          print(f"  Bundle:  {OLD_BUNDLE_BASE} -> {BUNDLE_ID}")
          print(f"  Profile: {PROFILE_UUID}")

          # All files to patch
          files_to_patch = []
          files_to_patch += glob.glob("**/*.pbxproj",   recursive=True)
          files_to_patch += glob.glob("**/*.xcconfig",  recursive=True)
          files_to_patch += glob.glob("**/*.plist",     recursive=True)

          for filepath in files_to_patch:
              try:
                  with open(filepath, "r", encoding="utf-8", errors="ignore") as f:
                      content = f.read()

                  original = content

                  # 1. Replace old team ID everywhere
                  content = content.replace(OLD_TEAM, TEAM_ID)

                  # 2. Replace sub-bundle IDs first (e.g. com.flekstore.livecontainer.LiveProcess)
                  #    Map them all to the same base BUNDLE_ID (enterprise profile covers one ID)
                  content = re.sub(
                      re.escape(OLD_BUNDLE_BASE) + r'\.[a-zA-Z0-9.]+',
                      BUNDLE_ID,
                      content
                  )

                  # 3. Replace the base bundle ID
                  content = content.replace(OLD_BUNDLE_BASE, BUNDLE_ID)

                  # 4. In pbxproj: switch all targets from Automatic to Manual signing
                  if filepath.endswith(".pbxproj"):
                      content = content.replace(
                          "ProvisioningStyle = Automatic",
                          "ProvisioningStyle = Manual"
                      )
                      content = content.replace(
                          'CODE_SIGN_STYLE = Automatic',
                          'CODE_SIGN_STYLE = Manual'
                      )
                      # Set provisioning profile specifier everywhere it's empty
                      content = re.sub(
                          r'PROVISIONING_PROFILE_SPECIFIER = "";',
                          f'PROVISIONING_PROFILE_SPECIFIER = "{PROFILE_UUID}";',
                          content
                      )
                      content = re.sub(
                          r'PROVISIONING_PROFILE_SPECIFIER = "";',
                          f'PROVISIONING_PROFILE_SPECIFIER = "{PROFILE_UUID}";',
                          content
                      )
                      # Switch iOS Development cert to Distribution
                      content = content.replace(
                          '"iOS Developer"',
                          '"iPhone Distribution"'
                      )
                      content = content.replace(
                          '"iOS Development"',
                          '"iPhone Distribution"'
                      )

                  if content != original:
                      with open(filepath, "w", encoding="utf-8") as f:
                          f.write(content)
                      print(f"  Patched: {filepath}")
                  else:
                      print(f"  No changes: {filepath}")

              except Exception as e:
                  print(f"  ERROR patching {filepath}: {e}")

          print("\n=== Verification ===")

          # Verify pbxproj
          pbxproj = "LiveContainer.xcodeproj/project.pbxproj"
          if os.path.exists(pbxproj):
              with open(pbxproj) as f:
                  content = f.read()
              print("\nTeam IDs found:")
              for line in content.splitlines():
                  if "DEVELOPMENT_TEAM" in line:
                      print(f"  {line.strip()}")
              print("\nBundle IDs found:")
              for line in content.splitlines():
                  if "PRODUCT_BUNDLE_IDENTIFIER" in line:
                      print(f"  {line.strip()}")
              print("\nSigning styles:")
              for line in content.splitlines():
                  if "CODE_SIGN_STYLE" in line or "ProvisioningStyle" in line:
                      print(f"  {line.strip()}")
              old_refs = content.count(OLD_TEAM) + content.count(OLD_BUNDLE_BASE)
              print(f"\nRemaining old references: {old_refs}")
          PYEOF

      - name: Build and Archive (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build and Archive (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project "LiveContainer.xcodeproj" \
            -scheme "LiveContainer" \
            -configuration Release \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

      - name: Create Export Options Plist (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          mkdir -p $PWD/build
          cat > $PWD/build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA (Enterprise)
        if: github.event.inputs.signing_method == 'enterprise'
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/LiveContainer.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist $PWD/build/ExportOptions.plist
          mv $PWD/build/export/LiveContainer.ipa $PWD/build/LiveContainer.ipa

      - name: Create IPA (Unsigned)
        if: github.event.inputs.signing_method != 'enterprise'
        run: |
          mkdir -p build/Payload
          cp -r build/LiveContainer.xcarchive/Products/Applications/LiveContainer.app build/Payload/
          cd build
          zip -r LiveContainer.ipa Payload
          rm -rf Payload
          echo "IPA created successfully:"
          ls -lh LiveContainer.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-${{ github.event.inputs.signing_method || 'enterprise' }}.ipa
          path: build/LiveContainer.ipa
